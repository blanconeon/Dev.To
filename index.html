Component tree or render hierarchy

              └── Root.jsx — layout component (NavBar + Outlet)
                    ├── NavBar — always visible
                    └── Outlet — current page renders here
                          ├── HomePage (route: /)
                          ├── ArticlePage (route: /articles/:id)
                          └── ProfilePage (route: /profile/:username)
